apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass

metadata:
  name: azure-keyvault-secrets
  namespace: devapp

spec:
  provider: azure

  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"

    userAssignedIdentityID: ""

    keyvaultName: "aks-key-vault-niyati"

    tenantId: "8989600b-fe48-4de4-a882-e285f8ee680c"

    objects: |
      array:
        - |
          objectName: mongourl
          objectType: secret