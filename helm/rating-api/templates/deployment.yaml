apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-api
spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: rating-api

  template:
    metadata:
      labels:
        app: rating-api

    spec:
      containers:
      - name: rating-api
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        env:
        - name: APP_MESSAGE
          valueFrom:
            configMapKeyRef:
              name: rating-api-config
              key: APP_MESSAGE

        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: MONGO_URL

        ports:
        - containerPort: 5000
        
        volumeMounts:
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 10
          periodSeconds: 5

        readinessProbe:
          httpGet:
            path: /health
            port: 5000

          initialDelaySeconds: 5
          periodSeconds: 5

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "200m"

      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true

          volumeAttributes:
            secretProviderClass: "azure-keyvault-secrets"