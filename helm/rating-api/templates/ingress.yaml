apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: rating-api-ingress
  labels:
    
spec:
  ingressClassName: nginx
  
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            
            backend:
              service:
                name: rating-api-service
                port:
                  number: 80
